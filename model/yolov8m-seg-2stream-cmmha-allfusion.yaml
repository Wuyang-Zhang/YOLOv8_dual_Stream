# Ultralytics YOLO 🚀, AGPL-3.0 license
# YOLOv8-seg instance segmentation model. For Usage examples see https://docs.ultralytics.com/tasks/segment

# Parameters
nc: 80  # number of classes
scales: # model compound scaling constants, i.e. 'model=yolov8n-seg.yaml' will call yolov8-seg.yaml with scale 'n'
  # [depth, width, max_channels]
  n: [0.33, 0.25, 1024]
  s: [0.33, 0.50, 1024]
  m: [0.67, 0.75, 768]
  l: [1.00, 1.00, 512]
  x: [1.00, 1.25, 512]

# YOLOv8.0n backbone
backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv, [64, 3, 2]]  # 0-P1/2 rgb
  - [-4, 1, Conv, [64, 3, 2]]  # 1-d
  - [[-1,0], 1, CrossModalMultiHeadAttention, [1,1]] # 2

  - [-1, 1, Conv, [128, 3, 2]]  # 3-rgb
  - [-2, 1, Conv, [ 128, 3, 2 ] ]  # 4-d
  - [[-1,3], 1, CrossModalMultiHeadAttention, [1,1]] # 5

  - [-1, 3, C2f, [128, True]] # 6-rgb
  - [-2, 3, C2f, [ 128, True ] ] # 7-d
  - [[-1,6], 1, CrossModalMultiHeadAttention, [1,1]] # 8

  - [-1, 1, Conv, [256, 3, 2]]  # 9-rgb
  - [-2, 1, Conv, [ 256, 3, 2 ] ]  # 10-d
  - [[-1,9], 1, CrossModalMultiHeadAttention, [1,1]] # 11

  - [-1, 6, C2f, [256, True]] # 12
  - [-2, 6, C2f, [ 256, True ] ] # 13
  - [[-1,12], 1, CrossModalMultiHeadAttention, [1,1]] # 14

  - [-1, 1, Conv, [512, 3, 2]]  # 15-rgb
  - [-2, 1, Conv, [ 512, 3, 2 ] ]  # 16-d
  - [[-1,15], 1, CrossModalMultiHeadAttention, [1,1]] # 17

  - [-1, 6, C2f, [512, True]] # 18-rgb
  - [-2, 6, C2f, [ 512, True ] ] # 19-d
  - [[-1,18], 1, CrossModalMultiHeadAttention, [1,1]] # 20

  - [-1, 1, Conv, [1024, 3, 2]]  # 21-rgb
  - [-2, 1, Conv, [ 1024, 3, 2 ] ]  # 22-d
  - [[-1,21], 1, CrossModalMultiHeadAttention, [1,1]] # 23

  - [-1, 3, C2f, [1024, True]] # 24
  - [-2, 3, C2f, [ 1024, True ] ] # 25
  - [[-1,24], 1, CrossModalMultiHeadAttention, [1,1]] # 26

  - [-1, 1, SPPF, [1024, 5]]  # 27
  - [-2, 1, SPPF, [ 1024, 5 ] ]  # 28
  - [[-1,27], 1, CrossModalMultiHeadAttention, [1,1]] # 29

# YOLOv8.0n head
head:
  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] # 30
  - [[-1, 20], 1, Concat, [1]]  # cat backbone P4
  - [-1, 3, C2f, [512]]  # 32

  - [-1, 1, nn.Upsample, [None, 2, 'nearest']] # 33
  - [[-1, 11], 1, Concat, [1]]  # cat backbone P3
  - [-1, 3, C2f, [256]]  # 35 (P3/8-small)

  - [-1, 1, Conv, [256, 3, 2]] # 36
  - [[-1, 32], 1, Concat, [1]]  # cat head P4
  - [-1, 3, C2f, [512]]  # 38 (P4/16-medium)

  - [-1, 1, Conv, [512, 3, 2]] # 39
  - [[-1, 29], 1, Concat, [1]]  # cat head P5
  - [-1, 3, C2f, [1024]]  # 41 (P5/32-large)

  - [[35, 38, 41], 1, Segment, [nc, 32, 256]]  # Segment(P3, P4, P5)